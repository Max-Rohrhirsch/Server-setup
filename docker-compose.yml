services:
  # Ghost DB
  ghost-db:
    image: mariadb:11
    container_name: ghost-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${GHOST_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${GHOST_DB_NAME}
      - MYSQL_USER=${GHOST_DB_USER}
      - MYSQL_PASSWORD=${GHOST_DB_PASSWORD}
    volumes:
      - ./data/ghost_db:/var/lib/mysql
    networks:
      - internal

  # Ghost Blog
  ghost:
    image: ghost:latest
    container_name: ghost
    restart: unless-stopped
    depends_on:
      - ghost-db
    ports:
      - "${GHOST_PORT}:2368"         # z B 8082
    environment:
      url: "${GHOST_URL}"
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: ${GHOST_DB_USER}
      database__connection__password: ${GHOST_DB_PASSWORD}
      database__connection__database: ${GHOST_DB_NAME}
    volumes:
      - ghost_content:/var/lib/ghost/content
    networks:
      - internal

  # Portainer
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_PORT}:9000"     # z B 9000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/portainer:/data
    networks:
      - internal

  # n8n
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT}:5678"           # z B 5678
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL}
      - GENERIC_TIMEZONE=${TZ}
      - DB_TYPE=sqlite
    volumes:
      - ./data/n8n:/home/node/.n8n
    networks:
      - internal

  # MariaDB für Piwigo
  piwigo_db:
    image: mariadb:10.11
    container_name: piwigo_db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${PIWIGO_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${PIWIGO_DB_NAME}
      - MYSQL_USER=${PIWIGO_DB_USER}
      - MYSQL_PASSWORD=${PIWIGO_DB_PASSWORD}
    volumes:
      - ./data/piwigo_db:/var/lib/mysql
    networks:
      - internal

  # Piwigo Foto Galerie
  piwigo:
    image: linuxserver/piwigo:latest
    container_name: piwigo
    restart: unless-stopped
    depends_on:
      - piwigo_db
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - PHP_MEMORY_LIMIT=512M
    volumes:
      - ./data/piwigo/config:/config
      - ./data/piwigo/gallery:/gallery
    ports:
      - "${PIWIGO_PORT}:80"          # z B 8081
    networks:
      - internal

  # Statische Webseite (GitHub Pages Build als Image)
  website:
    image: ghcr.io/max-rohrhirsch/max-rohrhirsch.github.io:latest
    container_name: website
    restart: unless-stopped
    ports:
      - "${WEBSITE_PORT}:80"         # z B 8080
    networks:
      - internal

  # MariaDB für Nextcloud
  mariadb-nextcloud:
    image: mariadb:11
    container_name: mariadb-nextcloud
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${NEXTCLOUD_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ./data/nextcloud_db:/var/lib/mysql
    networks:
      - internal

  # Nextcloud
  nextcloud:
    image: nextcloud:stable
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      - mariadb-nextcloud
    ports:
      - "${NEXTCLOUD_PORT}:80"       # z B 8084 (nicht 8080, sonst Clash mit website)
    environment:
      - MYSQL_HOST=mariadb-nextcloud
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
      - MYSQL_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - nextcloud_appdata:/var/www/html
    networks:
      - internal

  # optional: Watchtower (nur als Beispiel, noch auskommentiert)
  # websitwatchtower:
  #   image: containrrr/watchtower
  #   container_name: websitwatchtower
  #   restart: unless-stopped
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   command: >
  #     --interval 600
  #     --cleanup
  #     website nextcloud ghost piwigo
  #   networks:
  #     - internal

volumes:
  ghost_content:
  nextcloud_appdata:

networks:
  internal:
    driver: bridge